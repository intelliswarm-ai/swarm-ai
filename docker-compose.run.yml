    stdin_open: true
    tty: true

  mcp-research:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    env_file: .env
    environment:
      - WORKFLOW=mcp-research
      - MCP_FETCH_ENABLED=${MCP_FETCH_ENABLED:-true}
      - MCP_FETCH_CMD=uvx
      - MCP_FETCH_ARGS=mcp-server-fetch
    ports:
      - "8080:8080"
    volumes:
      - ./output:/app/output
    stdin_open: true
    tty: true

  iterative-memo:
    build:
      context: .
      dockerfile: Dockerfile.run
    env_file: .env
    environment:
      - WORKFLOW=iterative-memo
    ports:
      - "8080:8080"
    volumes:
      - ./output:/app/output
    stdin_open: true
    tty: true

  codebase-analysis:
    build:
      context: .
      dockerfile: Dockerfile.run
    env_file: .env
    environment:
      - WORKFLOW=codebase-analysis
    ports:
      - "8080:8080"
    volumes:
      - ./output:/app/output
    stdin_open: true
    tty: true

  web-research:
    build:
      context: .
      dockerfile: Dockerfile.run
    env_file: .env
    environment:
      - WORKFLOW=web-research
    ports:
      - "8080:8080"
    volumes:
      - ./output:/app/output
    stdin_open: true
    tty: true

  data-pipeline:
    build:
      context: .
      dockerfile: Dockerfile.run
    env_file: .env
    environment:
      - WORKFLOW=data-pipeline
    ports:
      - "8080:8080"
    volumes:
      - ./output:/app/output
    stdin_open: true
    tty: true

  self-improving:
    build:
      context: .
      dockerfile: Dockerfile.run
    env_file: .env
    environment:
      - WORKFLOW=self-improving
    ports:
      - "8080:8080"
    volumes:
      - ./output:/app/output
    stdin_open: true
    tty: true
