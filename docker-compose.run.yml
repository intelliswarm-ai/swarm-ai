# docker-compose.run.yml - Run SwarmAI example workflows
#
# QUICK START:
#   1. Copy .env.example to .env and add your API key
#   2. Run a workflow (Studio UI stays alive after completion):
#
#      # Stock analysis (PARALLEL — 3 agents analyze simultaneously)
#      docker compose -f docker-compose.run.yml run --rm --service-ports stock-analysis TSLA
#
#      # Research with custom query (HIERARCHICAL — manager + 4 specialists)
#      docker compose -f docker-compose.run.yml run --rm --service-ports research "AI trends in 2026"
#
#      # Due diligence (PARALLEL — financial + news + legal streams)
#      docker compose -f docker-compose.run.yml run --rm --service-ports due-diligence MSFT
#
#      # Iterative memo (ITERATIVE — execute → review → refine loop)
#      docker compose -f docker-compose.run.yml run --rm --service-ports iterative-memo NVDA 3
#
#   3. Open Studio UI: http://localhost:8080/studio
#      The server stays alive after the workflow completes so you can inspect results.

services:
  stock-analysis:
    build:
      context: .
      dockerfile: Dockerfile.run
    env_file: .env
    environment:
      - WORKFLOW=stock-analysis
    ports:
      - "8080:8080"
    volumes:
      - ./output:/app/output
    stdin_open: true
    tty: true

  research:
    build:
      context: .
      dockerfile: Dockerfile.run
    env_file: .env
    environment:
      - WORKFLOW=competitive-analysis
    ports:
      - "8080:8080"
    volumes:
      - ./output:/app/output
    stdin_open: true
    tty: true

  due-diligence:
    build:
      context: .
      dockerfile: Dockerfile.run
    env_file: .env
    environment:
      - WORKFLOW=due-diligence
