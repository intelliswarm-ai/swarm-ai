# docker-compose.run.yml - Run SwarmAI example workflows
#
# QUICK START:
#   1. Copy .env.example to .env and add your API key
#   2. Run a workflow:
#
#      # Stock analysis (default: AAPL)
#      docker compose -f docker-compose.run.yml run --rm stock-analysis
#
#      # Stock analysis for a specific ticker
#      docker compose -f docker-compose.run.yml run --rm stock-analysis TSLA
#
#      # Research with custom query
#      docker compose -f docker-compose.run.yml run --rm research "how will OpenClaw affect enterprise automation in 2026"

services:
  stock-analysis:
    build:
      context: .
      dockerfile: Dockerfile.run
    env_file: .env
    environment:
      - WORKFLOW=stock-analysis
    volumes:
      - ./output:/app/output
    stdin_open: true
    tty: true

  research:
    build:
      context: .
      dockerfile: Dockerfile.run
    env_file: .env
    environment:
      - WORKFLOW=competitive-analysis
    volumes:
      - ./output:/app/output
    stdin_open: true
    tty: true
