# docker-compose.run.yml - Run SwarmAI example workflows
#
# QUICK START:
#   1. Copy .env.example to .env and add your API key
#   2. Run a workflow:
#
#      # Stock analysis
#      docker compose -f docker-compose.run.yml run --rm stock-analysis TSLA
#
#      # Research with custom query
#      docker compose -f docker-compose.run.yml run --rm research "AI trends in 2026"
#
#      # Due diligence (parallel research streams)
#      docker compose -f docker-compose.run.yml run --rm due-diligence MSFT

services:
  stock-analysis:
    build:
      context: .
      dockerfile: Dockerfile.run
    env_file: .env
    environment:
      - WORKFLOW=stock-analysis
    volumes:
      - ./output:/app/output
    stdin_open: true
    tty: true

  research:
    build:
      context: .
      dockerfile: Dockerfile.run
    env_file: .env
    environment:
      - WORKFLOW=competitive-analysis
    volumes:
      - ./output:/app/output
    stdin_open: true
    tty: true

  due-diligence:
    build:
      context: .
      dockerfile: Dockerfile.run
    env_file: .env
    environment:
      - WORKFLOW=due-diligence
    volumes:
      - ./output:/app/output
    stdin_open: true
    tty: true

  mcp-research:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    env_file: .env
    environment:
      - WORKFLOW=mcp-research
      - MCP_FETCH_ENABLED=${MCP_FETCH_ENABLED:-true}
      - MCP_FETCH_CMD=uvx
      - MCP_FETCH_ARGS=mcp-server-fetch
    volumes:
      - ./output:/app/output
    stdin_open: true
    tty: true
