# SwarmAI Iterative Investment Memo - Docker Compose Configuration
#
# Demonstrates the ITERATIVE process type:
#   Research Analyst -> Memo Writer -> MD Reviewer -> (loop if NEEDS_REFINEMENT)
#
# Usage:
#   docker compose up --build                           # Analyze NVDA (default)
#   STOCK_TICKER=TSLA docker compose up --build         # Analyze Tesla
#   STOCK_TICKER=AAPL MAX_ITERATIONS=5 docker compose up --build  # 5 iterations max

version: '3.8'

services:
  # Ollama service for local LLM hosting
  ollama:
    image: ollama/ollama:latest
    platform: linux/amd64
    container_name: iterative-ollama
    ports:
      - "11436:11434"
    volumes:
      - iterative_ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - iterative-network

  # Model setup service - downloads required model
  ollama-setup:
    image: curlimages/curl:latest
    container_name: iterative-ollama-setup
    depends_on:
      ollama:
        condition: service_healthy
    command: |
      sh -c '
        echo "Setting up Ollama models for iterative example..."

        sleep 10

        # Check if model exists
        if curl -sf http://ollama:11434/api/tags | grep -q "llama3.2:3b"; then
          echo "Model llama3.2:3b already exists"
        else
          echo "Downloading model llama3.2:3b..."
          curl -sf -X POST http://ollama:11434/api/pull \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"llama3.2:3b\"}"
          echo "Model download completed"
        fi

        # Test the model
        echo "Testing model..."
        response=$(curl -sf -X POST http://ollama:11434/api/generate \
          -H "Content-Type: application/json" \
          -d "{\"model\":\"llama3.2:3b\",\"prompt\":\"Hello! Say Model Ready\",\"stream\":false}" | \
          grep -o "\"response\":\"[^\"]*\"" | sed "s/\"response\":\"//;s/\"//")

        if [ -n "$response" ]; then
          echo "Model test successful: $response"
        else
          echo "Model test failed"
        fi

        echo "Ollama setup completed!"
      '
    networks:
      - iterative-network

  # SwarmAI Iterative Investment Memo application
  iterative-app:
    image: swarmai-iterative:latest
    container_name: iterative-investment-memo
    depends_on:
      ollama-setup:
        condition: service_completed_successfully
    environment:
      # Spring AI configuration for Ollama
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_AI_OLLAMA_BASE_URL=http://ollama:11434
      - SPRING_AI_OLLAMA_CHAT_OPTIONS_MODEL=llama3.2:3b
      - SPRING_AI_OLLAMA_CHAT_OPTIONS_TEMPERATURE=0.7

      # SwarmAI configuration
      - SWARMAI_DEFAULT_MAX_RPM=15
      - SWARMAI_DEFAULT_MAX_EXECUTION_TIME=900000  # 15 minutes for iterative workflows
      - SWARMAI_DEFAULT_VERBOSE=true

      # Iterative workflow configuration
      - STOCK_TICKER=${STOCK_TICKER:-NVDA}
      - MAX_ITERATIONS=${MAX_ITERATIONS:-3}

      # Java runtime options - iterative workflows need more memory for context accumulation
      - JAVA_OPTS=-Xmx2g -XX:+UseG1GC -XX:MaxGCPauseMillis=100 -XX:+UseStringDeduplication

      # Logging
      - LOGGING_LEVEL_AI_INTELLISWARM_SWARMAI=DEBUG
      - LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_AI=INFO

    ports:
      - "8080:8080"
    volumes:
      - ./reports:/app/reports
      - ./logs:/app/logs
      - ./config:/app/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 2m
    networks:
      - iterative-network

  # Optional: Ollama Web UI for model management
  ollama-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: iterative-ollama-webui
    depends_on:
      - ollama
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=iterative-swarm-key
      - WEBUI_NAME=SwarmAI Iterative UI
    volumes:
      - iterative_ollama_webui_data:/app/backend/data
    restart: unless-stopped
    profiles:
      - webui
    networks:
      - iterative-network

volumes:
  iterative_ollama_data:
    driver: local
    name: iterative_ollama_data
  iterative_ollama_webui_data:
    driver: local
    name: iterative_ollama_webui_data

networks:
  iterative-network:
    name: iterative-network
    driver: bridge

# Usage Examples:
#
# 1. Start the complete iterative environment:
#    docker compose up --build
#
# 2. Analyze a different stock with more iterations:
#    STOCK_TICKER=TSLA MAX_ITERATIONS=5 docker compose up --build
#
# 3. Include Web UI for model management:
#    docker compose --profile webui up --build
#
# 4. Check logs (watch the iteration feedback loop):
#    docker compose logs -f iterative-app
#
# 5. Clean up:
#    docker compose down -v
