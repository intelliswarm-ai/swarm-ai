spring:
  application:
    name: swarmai-framework
  
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7
    
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: claude-3-sonnet-20240229
          temperature: 0.7
    
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: llama3.2
          temperature: 0.7

swarmai:
  default:
    max-rpm: 30
    max-execution-time: 300000  # 5 minutes in milliseconds
    verbose: false
    language: en
    
  memory:
    enabled: true
    provider: in-memory  # Options: in-memory, redis, postgresql
    
  knowledge:
    enabled: true
    provider: chroma  # Options: chroma, pgvector, in-memory
    
  telemetry:
    enabled: true
    export-interval: 30000  # 30 seconds

  observability:
    enabled: true
    structured-logging-enabled: true
    tool-tracing-enabled: true
    decision-tracing-enabled: false  # Enable for debugging (higher overhead)
    replay-enabled: true
    metrics-enabled: true

    replay:
      store-type: in-memory  # Options: in-memory, file
      store-directory: ./observability/events
      retention-days: 7
      max-events-in-memory: 10000

    decision:
      capture-prompts: true
      capture-responses: true
      max-prompt-length: 10000
      max-response-length: 10000

    metrics:
      prefix: swarm
      histogram-percentiles-enabled: true
      percentiles: 0.5, 0.9, 0.95, 0.99

  # Multi-tenancy support for resource isolation
  tenant:
    enabled: false
    default-quota:
      max-concurrent-workflows: 10
      max-skills: 100
      max-memory-entries: 10000
      max-token-budget: 1000000

  # Token/cost budget tracking per workflow
  budget:
    enabled: false
    default-max-tokens: 1000000
    default-max-cost-usd: 10.0
    default-action: WARN  # WARN or HARD_STOP
    warning-threshold-percent: 80.0

  # Workflow governance with human-in-the-loop approval gates
  governance:
    enabled: false
    default-gate-timeout-minutes: 30
    auto-approve-on-timeout: false
    skill-promotion:
      requires-approval: false
      required-approvals: 1

  # Studio Web UI for runtime inspection of workflow processes
  studio:
    enabled: ${SWARMAI_STUDIO_ENABLED:true}  # Enable the Studio UI at /studio

  # Self-improving workflow configuration
  # All values here replace hardcoded defaults in SelfImprovingWorkflow.
  # Override per-environment in application-{profile}.yml.
  workflow:
    # Default LLM model for all agents (overridable per agent below)
    model: ${SWARMAI_MODEL:gpt-4o-mini}

    # Self-improving process limits
    max-iterations: 15
    verbose: true
    language: en
    max-rpm: 20

    # Per-agent configuration
    agents:
      analyst:
        temperature: 0.2
        max-rpm: 15
        verbose: true
        # model: gpt-4.1  # Uncomment to override the global model for this agent
      writer:
        temperature: 0.3
        max-rpm: 10
        verbose: true
      reviewer:
        temperature: 0.1
        max-rpm: 10
        verbose: true
      planner:
        temperature: 0.1
        max-rpm: 10
        verbose: false

    # Per-task execution limits (milliseconds)
    tasks:
      analysis:
        max-execution-time: 300000   # 5 minutes
      report:
        max-execution-time: 180000   # 3 minutes
      planning:
        max-execution-time: 30000    # 30 seconds

    # Tool selection — empty means all available tools
    # Uncomment and list specific tools to restrict:
    # tools:
    #   - calculator
    #   - web_search
    #   - http_request
    #   - web_scrape

    # Known-good API endpoints the planner can recommend (prevents URL hallucination)
    known-endpoints:
      - name: Wikipedia summary
        url: "https://en.wikipedia.org/api/rest_v1/page/summary/{topic}"
        description: "GET — returns JSON summary of a Wikipedia article"
      - name: Wikipedia search
        url: "https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch={query}&format=json"
        description: "GET — search Wikipedia articles"
      - name: GitHub repos
        url: "https://api.github.com/search/repositories?q={query}&sort=stars"
        description: "GET — search GitHub repositories by stars"
      - name: GitHub topics
        url: "https://api.github.com/search/topics?q={query}"
        description: "GET — search GitHub topics"
      - name: Hacker News
        url: "https://hn.algolia.com/api/v1/search?query={query}&tags=story"
        description: "GET — search Hacker News stories"
      - name: DuckDuckGo instant
        url: "https://api.duckduckgo.com/?q={query}&format=json&no_html=1"
        description: "GET — DuckDuckGo instant answers"
      - name: JSONPlaceholder
        url: "https://jsonplaceholder.typicode.com/posts"
        description: "GET — test/demo REST API"

    # URLs safe for web_scrape
    scrape-safe-urls:
      - "https://en.wikipedia.org/wiki/{topic}"
      - "https://news.ycombinator.com"

    # Output configuration
    output:
      report-file: "output/self_improving_report.md"
      format: markdown

    # Planning/review constraints
    planning:
      max-capability-gaps-per-review: 1
      max-next-commands-per-review: 5

# Stock analysis tool configuration
stock:
  search:
    # Google Custom Search API for general web search
    # Get free API key from: https://developers.google.com/custom-search/v1/overview
    # Create custom search engine at: https://cse.google.com/cse/
    google:
      api-key: ${GOOGLE_API_KEY:}  # Set your Google API key here
      search-engine-id: ${GOOGLE_SEARCH_ENGINE_ID:}  # Set your Custom Search Engine ID
      
    # Bing Search API for general web search
    # Get free API key from: https://www.microsoft.com/en-us/bing/apis/bing-web-search-api
    bing:
      api-key: ${BING_API_KEY:}  # Set your Bing Search API key here
      
    # Alpha Vantage API for market data and company overviews
    # Get free API key from: https://www.alphavantage.co/support/#api-key
    alphavantage:
      api-key: demo  # Replace with your Alpha Vantage API key
      
    # NewsAPI for financial news aggregation  
    # Get free API key from: https://newsapi.org/register
    newsapi:
      api-key: ${NEWSAPI_KEY:}  # Set your NewsAPI key here
      
    # Finnhub for stock news and market data
    # Get free API key from: https://finnhub.io/register
    finnhub:
      api-key: ${FINNHUB_API_KEY:}  # Set your Finnhub API key here
      
    # Polygon.io for market data (optional)
    # Get API key from: https://polygon.io/
    polygon:
      api-key: ${POLYGON_API_KEY:}  # Set your Polygon.io API key here
      
    # Rate limiting and caching
    rate-limit:
      requests-per-minute: 60
      cache-ttl-minutes: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env
  endpoint:
    health:
      show-details: when-authorized
      
logging:
  level:
    ai.intelliswarm.swarmai: DEBUG
    org.springframework.ai: INFO
    root: INFO
  pattern:
    # Include MDC fields for correlation: correlationId, traceId, swarmId, agentId, taskId
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level [%X{correlationId:-}] %logger{36} - %msg%n"