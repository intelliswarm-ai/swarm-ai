<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwarmAI Studio</title>

    <!-- vis-network for workflow graph visualization -->
    <script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
    <!-- Chart.js for dashboards -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>

    <link rel="stylesheet" href="/studio/css/studio.css">

    <link rel="icon" href="/studio/img/logo.png" type="image/png">
    <script>
        window.onerror = function(msg, url, line, col, err) {
            var el = document.getElementById('mainContent');
            if (el) el.innerHTML = '<pre style="color:#ef5350;padding:20px;font-size:14px;">JS ERROR: ' + msg + '\nFile: ' + url + ':' + line + ':' + col + '\n' + (err ? err.stack : '') + '</pre>';
            return false;
        };
        window.addEventListener('unhandledrejection', function(event) {
            var el = document.getElementById('mainContent');
            if (el) el.innerHTML = '<pre style="color:#ef5350;padding:20px;font-size:14px;">PROMISE ERROR: ' + event.reason + '\n' + (event.reason && event.reason.stack ? event.reason.stack : '') + '</pre>';
        });
    </script>
</head>
<body>
    <!-- ===== HEADER ===== -->
    <header class="studio-header">
        <div class="header-left">
            <div class="logo">
                <img src="/studio/img/logo.png" alt="IntelliSwarm.ai" class="logo-icon" width="32" height="32" style="border-radius:6px;">
                <span class="logo-text">SwarmAI <span class="logo-accent">Studio</span></span>
            </div>
        </div>
        <nav class="header-nav">
            <a href="#/dashboard" class="nav-link" data-view="dashboard">Dashboard</a>
            <a href="#/workflows" class="nav-link" data-view="workflows">Workflows</a>
            <a href="#/tokens" class="nav-link" data-view="tokens">Tokens</a>
        </nav>
        <div class="header-right">
            <div class="connection-indicator" id="connectionIndicator">
                <span class="connection-dot"></span>
                <span class="connection-label">Disconnected</span>
            </div>
        </div>
    </header>

    <!-- ===== LAYOUT ===== -->
    <div class="studio-layout">

        <!-- ===== SIDEBAR ===== -->
        <aside class="studio-sidebar" id="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-heading">Navigation</div>
                <a href="#/dashboard" class="sidebar-link active" data-view="dashboard">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
                    Dashboard
                </a>
                <a href="#/workflows" class="sidebar-link" data-view="workflows">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M2 3h12v2H2V3zm0 4h12v2H2V7zm0 4h8v2H2v-2z"/></svg>
                    Workflows
                </a>
                <a href="#/tokens" class="sidebar-link" data-view="tokens">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="6" fill="none" stroke="currentColor" stroke-width="2"/><text x="8" y="11" font-size="8" text-anchor="middle" fill="currentColor">T</text></svg>
                    Token Usage
                </a>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-heading">Live Feed</div>
                <div class="live-indicator" id="liveIndicator">
                    <span class="live-dot" id="liveDot"></span>
                    <span id="liveLabel">Events paused</span>
                </div>
                <div class="sidebar-event-feed" id="sidebarEventFeed">
                    <div class="empty-state-small">No events yet</div>
                </div>
            </div>

            <div class="sidebar-section sidebar-footer-section">
                <div class="sidebar-version">SwarmAI Studio v1.0</div>
            </div>
        </aside>

        <!-- ===== MAIN CONTENT ===== -->
        <main class="studio-main" id="mainContent">
            <!-- Loading state shown initially -->
            <div class="view-loading" id="initialLoading">
                <div class="spinner"></div>
                <p>Loading SwarmAI Studio...</p>
            </div>
        </main>
    </div>

    <!-- ===== TASK DETAIL SLIDE-IN PANEL ===== -->
    <div class="task-panel-overlay" id="taskPanelOverlay"></div>
    <div class="task-panel" id="taskPanel">
        <div class="task-panel-header">
            <h3>Task Detail</h3>
            <button class="task-panel-close" id="taskPanelClose" aria-label="Close panel">&times;</button>
        </div>
        <div class="task-panel-content" id="taskPanelContent">
            <!-- Populated dynamically -->
        </div>
    </div>

    <!-- ===== SCRIPTS ===== -->
    <script src="/studio/js/dashboard.js"></script>
    <script src="/studio/js/graph.js"></script>
    <script src="/studio/js/timeline.js"></script>
    <script src="/studio/js/studio.js"></script>
</body>
</html>
