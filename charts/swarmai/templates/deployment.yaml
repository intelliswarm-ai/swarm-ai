apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-swarmai
  labels:
    app: swarmai
    release: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: swarmai
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: swarmai
        release: {{ .Release.Name }}
    spec:
      containers:
        - name: swarmai
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: JAVA_OPTS
              value: "-Xmx2g -XX:+UseG1GC"
            - name: SPRING_AI_OLLAMA_BASE_URL
              value: "{{ .Values.config.spring.ai.ollama.base_url | default "http://ollama:11434" }}"
            {{- if .Values.enterprise.licenseKey }}
            - name: SWARMAI_ENTERPRISE_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-license
                  key: license-key
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: 8080
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: 8080
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /app/config
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-config
