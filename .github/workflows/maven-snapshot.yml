name: Publish Snapshot

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests (use with caution)'
        required: false
        default: 'false'
        type: boolean

# Prevent concurrent snapshot deployments
concurrency:
  group: snapshot-deploy
  cancel-in-progress: false

permissions:
  contents: read
  checks: write
  packages: write

jobs:
  # ============================================
  # Run full regression suite before publishing
  # ============================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Run unit tests
      if: ${{ github.event.inputs.skip_tests != 'true' }}
      run: mvn clean test -DexcludedGroups=integration

    - name: Generate test report
      uses: dorny/test-reporter@v1
      if: (success() || failure()) && github.event.inputs.skip_tests != 'true'
      with:
        name: Unit Tests
        path: target/surefire-reports/*.xml
        reporter: java-junit

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Run integration tests
      if: ${{ github.event.inputs.skip_tests != 'true' }}
      run: mvn verify -Dgroups=integration -DskipTests=false
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        GOOGLE_SEARCH_ENGINE_ID: ${{ secrets.GOOGLE_SEARCH_ENGINE_ID }}
        BING_API_KEY: ${{ secrets.BING_API_KEY }}
        NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    - name: Generate integration test report
      uses: dorny/test-reporter@v1
      if: (success() || failure()) && github.event.inputs.skip_tests != 'true' && hashFiles('target/failsafe-reports/*.xml') != ''
      with:
        name: Integration Tests
        path: target/failsafe-reports/*.xml
        reporter: java-junit

  # ============================================
  # Publish snapshot to Maven Central (OSSRH)
  # ============================================
  publish-ossrh:
    name: Publish to OSSRH
    runs-on: ubuntu-latest
    needs: [ unit-tests, integration-tests ]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21 for OSSRH
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        server-id: ossrh
        server-username: MAVEN_USERNAME
        server-password: MAVEN_PASSWORD
        gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
        gpg-passphrase: MAVEN_GPG_PASSPHRASE

    - name: Verify SNAPSHOT version
      run: |
        VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
        echo "Project version: $VERSION"
        if [[ ! "$VERSION" == *-SNAPSHOT ]]; then
          echo "Error: Version must be a SNAPSHOT version for this workflow"
          exit 1
        fi
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Deploy to OSSRH Snapshots
      run: |
        mvn --batch-mode -Prelease deploy -DskipTests
      env:
        MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
        MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
        MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

    - name: Summary
      run: |
        echo "## OSSRH Snapshot Published" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Version:** ${{ env.VERSION }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Repository:** https://s01.oss.sonatype.org/content/repositories/snapshots" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Maven Dependency" >> $GITHUB_STEP_SUMMARY
        echo '```xml' >> $GITHUB_STEP_SUMMARY
        echo '<dependency>' >> $GITHUB_STEP_SUMMARY
        echo '    <groupId>ai.intelliswarm</groupId>' >> $GITHUB_STEP_SUMMARY
        echo '    <artifactId>swarmai-framework</artifactId>' >> $GITHUB_STEP_SUMMARY
        echo "    <version>${{ env.VERSION }}</version>" >> $GITHUB_STEP_SUMMARY
        echo '</dependency>' >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Publish snapshot to GitHub Packages
  # ============================================
  publish-github:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: [ unit-tests, integration-tests ]
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21 for GitHub Packages
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Get version
      run: |
        VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Deploy to GitHub Packages
      run: |
        mvn --batch-mode deploy -DskipTests \
          -DaltDeploymentRepository=github::https://maven.pkg.github.com/${{ github.repository }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Summary
      run: |
        echo "## GitHub Packages Snapshot Published" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Version:** ${{ env.VERSION }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Repository:** https://github.com/${{ github.repository }}/packages" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Upload build artifacts
  # ============================================
  upload-artifacts:
    name: Upload Artifacts
    runs-on: ubuntu-latest
    needs: [ publish-ossrh, publish-github ]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build artifacts
      run: mvn clean package -DskipTests

    - name: Upload JAR artifacts
      uses: actions/upload-artifact@v4
      with:
        name: snapshot-artifacts
        path: |
          target/*.jar
          target/*.pom
        retention-days: 30
