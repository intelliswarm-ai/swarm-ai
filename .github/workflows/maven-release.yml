name: Maven Release

on:
  # Path A: maintainer dispatches manually (preferred)
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'How to compute the release version. Pick one.'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch     # 1.0.0 -> 1.0.1
          - minor     # 1.0.0 -> 1.1.0
          - major     # 1.0.0 -> 2.0.0
          - explicit  # use the "version" field below
      version:
        description: 'Explicit release version (e.g. 1.0.0). Required only when bump_type=explicit; ignored otherwise.'
        required: false
        default: ''
      next_version:
        description: 'Next dev version (e.g. 1.0.1-SNAPSHOT). Leave blank to auto-bump patch from the released version.'
        required: false
        default: ''
      dry_run:
        description: 'Build + sign + verify, but do NOT publish or tag. Use to validate before a real release.'
        required: false
        default: false
        type: boolean
  # Path B: maintainer publishes a GitHub Release manually (legacy trigger, still supported)
  release:
    types: [ published ]

# Prevent concurrent releases
concurrency:
  group: release-deploy
  cancel-in-progress: false

permissions:
  contents: read
  checks: write
  packages: write

jobs:
  # ============================================
  # Validate release version (works for both triggers)
  # ============================================
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      dry_run: ${{ steps.version.outputs.dry_run }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # need full history to find latest semver tag

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Resolve and validate version
      id: version
      run: |
        BUMP_TYPE="${{ github.event.inputs.bump_type }}"
        EXPLICIT_VERSION="${{ github.event.inputs.version }}"
        DRY_RUN="${{ github.event.inputs.dry_run }}"

        if [[ "${{ github.event_name }}" == "release" ]]; then
          # Path B: release event always uses the tag name verbatim
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          DRY_RUN="false"
          echo "Triggered by release event. Version=$VERSION"
        elif [[ "$BUMP_TYPE" == "explicit" ]]; then
          # Path A, explicit mode: use the version input verbatim
          VERSION="${EXPLICIT_VERSION#v}"
          if [[ -z "$VERSION" ]]; then
            echo "::error::bump_type=explicit requires the 'version' input to be set."
            exit 1
          fi
          echo "Triggered manually (explicit). Version=$VERSION"
        else
          # Path A, semver mode: derive from latest tag
          # Find the most recent semver tag (vX.Y.Z). Fall back to v0.0.0 if none exist.
          LAST_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)
          if [[ -z "$LAST_TAG" ]]; then
            LAST_TAG="v0.0.0"
            echo "::notice::No existing semver tag found. Treating previous version as 0.0.0."
          fi
          PREV="${LAST_TAG#v}"

          if [[ ! "$PREV" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "::error::Latest tag '$LAST_TAG' is not in vMAJOR.MINOR.PATCH format. Use bump_type=explicit."
            exit 1
          fi
          MAJOR="${BASH_REMATCH[1]}"
          MINOR="${BASH_REMATCH[2]}"
          PATCH="${BASH_REMATCH[3]}"

          case "$BUMP_TYPE" in
            patch) VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
            minor) VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
            major) VERSION="$((MAJOR + 1)).0.0" ;;
            *)
              echo "::error::Unknown bump_type '$BUMP_TYPE'."
              exit 1
              ;;
          esac
          echo "Bump type=$BUMP_TYPE. Last tag=$LAST_TAG. Computed version=$VERSION."
        fi

        # Reject SNAPSHOT (shouldn't happen with derived versions, but guard anyway)
        if [[ "$VERSION" == *-SNAPSHOT ]]; then
          echo "::error::Cannot release a SNAPSHOT version ($VERSION). Drop the suffix."
          exit 1
        fi

        # Reject if a tag for this version already exists
        if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
          echo "::error::Tag v${VERSION} already exists. Pick a different version or delete the old tag."
          exit 1
        fi

        # Cross-check against POM (advisory only; we override the POM later)
        POM_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
        POM_BASE="${POM_VERSION%-SNAPSHOT}"
        if [[ "$POM_BASE" != "$VERSION" ]]; then
          echo "::notice::POM version ($POM_VERSION) does not match release version ($VERSION). Will override POM."
        fi

        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "dry_run=$DRY_RUN" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Resolved release version: \`$VERSION\` (dry_run=$DRY_RUN)" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Run full regression suite
  # ============================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: validate

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Update version
      run: |
        mvn versions:set -DnewVersion=${{ needs.validate.outputs.version }} -DgenerateBackupPoms=false

    - name: Run unit tests
      run: mvn clean test -DexcludedGroups=integration

    - name: Generate test report
      uses: dorny/test-reporter@v1
      if: success() || failure()
      with:
        name: Release Unit Tests
        path: '**/target/surefire-reports/*.xml'
        reporter: java-junit

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [ validate, unit-tests ]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Update version
      run: |
        mvn versions:set -DnewVersion=${{ needs.validate.outputs.version }} -DgenerateBackupPoms=false

    - name: Run integration tests
      run: mvn verify -Dgroups=integration -DskipTests=false
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        GOOGLE_SEARCH_ENGINE_ID: ${{ secrets.GOOGLE_SEARCH_ENGINE_ID }}
        BING_API_KEY: ${{ secrets.BING_API_KEY }}
        NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    - name: Generate integration test report
      uses: dorny/test-reporter@v1
      if: (success() || failure()) && hashFiles('**/target/failsafe-reports/*.xml') != ''
      with:
        name: Release Integration Tests
        path: '**/target/failsafe-reports/*.xml'
        reporter: java-junit

  # ============================================
  # Deploy to Maven Central
  #
  # No environment gate today — the workflow runs straight through after tests.
  # If you later want a manual approval step before publishing, configure a GitHub
  # environment (Settings > Environments > New > "production" with Required reviewers)
  # and add `environment: production` to this job and `publish-github` below.
  # ============================================
  publish-maven-central:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    needs: [ validate, unit-tests, integration-tests ]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        server-id: central
        server-username: CENTRAL_USERNAME
        server-password: CENTRAL_PASSWORD
        gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
        gpg-passphrase: MAVEN_GPG_PASSPHRASE

    - name: Update version
      run: |
        mvn versions:set -DnewVersion=${{ needs.validate.outputs.version }} -DgenerateBackupPoms=false

    - name: Build, sign, and publish to Maven Central
      run: |
        if [[ "${{ needs.validate.outputs.dry_run }}" == "true" ]]; then
          echo "::notice::DRY RUN — building and signing only, NOT publishing."
          mvn --batch-mode -Prelease verify -DskipTests
        else
          mvn --batch-mode -Prelease deploy -DskipTests
        fi
      env:
        CENTRAL_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
        CENTRAL_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
        MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

    - name: Summary
      run: |
        if [[ "${{ needs.validate.outputs.dry_run }}" == "true" ]]; then
          echo "## DRY RUN — Maven Central Publish Skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Build, signing, and verification all succeeded for version **${{ needs.validate.outputs.version }}**." >> $GITHUB_STEP_SUMMARY
          echo "Re-run this workflow with **dry_run = false** to publish for real." >> $GITHUB_STEP_SUMMARY
        else
          echo "## Maven Central Release Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ needs.validate.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Search:** https://central.sonatype.com/search?q=g:ai.intelliswarm" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Sync to repo1.maven.org typically takes 5-30 minutes." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Maven Dependency" >> $GITHUB_STEP_SUMMARY
          echo '```xml' >> $GITHUB_STEP_SUMMARY
          echo '<dependency>' >> $GITHUB_STEP_SUMMARY
          echo '    <groupId>ai.intelliswarm</groupId>' >> $GITHUB_STEP_SUMMARY
          echo '    <artifactId>swarmai-core</artifactId>' >> $GITHUB_STEP_SUMMARY
          echo "    <version>${{ needs.validate.outputs.version }}</version>" >> $GITHUB_STEP_SUMMARY
          echo '</dependency>' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        fi

  # ============================================
  # Publish to GitHub Packages (all 10 modules including BSL)
  # ============================================
  publish-github:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: [ validate, unit-tests, integration-tests ]
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Update version
      run: |
        mvn versions:set -DnewVersion=${{ needs.validate.outputs.version }} -DgenerateBackupPoms=false

    - name: Build, sign, and publish to GitHub Packages
      run: |
        if [[ "${{ needs.validate.outputs.dry_run }}" == "true" ]]; then
          echo "::notice::DRY RUN — building only, NOT publishing to GitHub Packages."
          mvn --batch-mode package -DskipTests
        else
          mvn --batch-mode deploy -DskipTests \
            -DaltDeploymentRepository=github::https://maven.pkg.github.com/${{ github.repository }}
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Summary
      run: |
        if [[ "${{ needs.validate.outputs.dry_run }}" == "true" ]]; then
          echo "## DRY RUN — GitHub Packages Publish Skipped" >> $GITHUB_STEP_SUMMARY
        else
          echo "## GitHub Packages Release Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ needs.validate.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository:** https://github.com/${{ github.repository }}/packages" >> $GITHUB_STEP_SUMMARY
        fi

  # ============================================
  # Auto-tag + create GitHub Release (workflow_dispatch path only)
  # On the 'release: published' path, the tag + release already exist.
  # On dry_run, this step is skipped entirely.
  # ============================================
  tag-and-release:
    name: Create Git Tag and GitHub Release
    runs-on: ubuntu-latest
    needs: [ validate, publish-maven-central, publish-github ]
    if: github.event_name == 'workflow_dispatch' && needs.validate.outputs.dry_run == 'false'
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Configure Git
      run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"

    - name: Create and push tag
      run: |
        TAG="v${{ needs.validate.outputs.version }}"
        if git rev-parse "$TAG" >/dev/null 2>&1; then
          echo "::warning::Tag $TAG already exists, skipping tag creation."
        else
          git tag -a "$TAG" -m "SwarmAI ${{ needs.validate.outputs.version }}"
          git push origin "$TAG"
        fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ needs.validate.outputs.version }}
        name: SwarmAI v${{ needs.validate.outputs.version }}
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # Upload release artifacts to GitHub Release
  # Runs for both trigger paths (release event or workflow_dispatch).
  # On dry_run, only uploads to workflow artifacts (not the GitHub Release).
  # ============================================
  upload-artifacts:
    name: Upload Release Artifacts
    runs-on: ubuntu-latest
    needs: [ validate, publish-maven-central, publish-github ]
    if: needs.validate.outputs.dry_run == 'false' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Update version
      run: |
        mvn versions:set -DnewVersion=${{ needs.validate.outputs.version }} -DgenerateBackupPoms=false

    - name: Build release artifacts
      run: mvn clean package -DskipTests -Prelease

    - name: Upload artifacts to GitHub Release
      if: needs.validate.outputs.dry_run == 'false'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ needs.validate.outputs.version }}
        files: |
          **/target/*.jar
          **/target/*.pom
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload artifacts to workflow
      uses: actions/upload-artifact@v4
      with:
        name: release-artifacts-${{ needs.validate.outputs.version }}
        path: |
          **/target/*.jar
          **/target/*.pom
        retention-days: 90

  # ============================================
  # Bump main to the next -SNAPSHOT after a successful release
  # Skipped on dry_run.
  # If next_version input is blank, auto-bumps the patch component:
  #   1.0.0 -> 1.0.1-SNAPSHOT
  # Otherwise uses the value provided.
  # ============================================
  bump-next-snapshot:
    name: Bump main to next SNAPSHOT
    runs-on: ubuntu-latest
    needs: [ validate, publish-maven-central, publish-github ]
    if: needs.validate.outputs.dry_run == 'false'
    permissions:
      contents: write

    steps:
    - name: Checkout main
      uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Compute next SNAPSHOT version
      id: next
      run: |
        RELEASED="${{ needs.validate.outputs.version }}"
        INPUT="${{ github.event.inputs.next_version }}"

        if [[ -n "$INPUT" ]]; then
          NEXT="$INPUT"
          # Ensure -SNAPSHOT suffix
          if [[ "$NEXT" != *-SNAPSHOT ]]; then
            NEXT="${NEXT}-SNAPSHOT"
          fi
          echo "Using maintainer-provided next version: $NEXT"
        else
          # Auto-bump patch: 1.0.0 -> 1.0.1-SNAPSHOT
          if [[ ! "$RELEASED" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Cannot auto-bump non-semver version '$RELEASED'. Re-run and provide next_version explicitly."
            exit 1
          fi
          MAJOR="${RELEASED%%.*}"
          REST="${RELEASED#*.}"
          MINOR="${REST%%.*}"
          PATCH="${RELEASED##*.}"
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))-SNAPSHOT"
          echo "Auto-bumped patch: $RELEASED -> $NEXT"
        fi

        echo "next=$NEXT" >> $GITHUB_OUTPUT

    - name: Configure Git
      run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"

    - name: Bump POM versions
      run: |
        mvn versions:set -DnewVersion=${{ steps.next.outputs.next }} -DgenerateBackupPoms=false

    - name: Commit and push
      run: |
        if git diff --quiet; then
          echo "::notice::No POM changes to commit (already at ${{ steps.next.outputs.next }})."
          exit 0
        fi
        git add -A '*pom.xml'
        git commit -m "chore(release): bump version to ${{ steps.next.outputs.next }} for next development iteration"
        git push origin main

    - name: Summary
      run: |
        echo "## Next Development Version" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "main is now at **${{ steps.next.outputs.next }}**." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Published release: **${{ needs.validate.outputs.version }}**" >> $GITHUB_STEP_SUMMARY
